{{define "modals/qrcodeModal"}}
<a-modal id="qrcode-modal" v-model="qrModal.visible" :closable="true" :class="themeSwitcher.currentTheme"
  width="fit-content" :dialog-style="isMobile ? { top: '18px' } : {}" :footer="null">
  <template #title>
    <a-space direction="horizontal">
      <span>[[ qrModal.title ]]</span>
      <a-space v-if="availableVariants.length > 1" direction="horizontal">
        <a-button
          v-for="variant in availableVariants"
          :key="variant.key"
          size="small"
          :type="hostVariant === variant.key ? 'primary' : 'default'"
          @click="setHostVariant(variant.key)">
          [[ variant.label ]]
        </a-button>
      </a-space>
    </a-space>
  </template>
  <tr-qr-modal class="qr-modal">
    <template v-if="app.subSettings?.enable && qrModal.subId">
      <tr-qr-box class="qr-box">
        <a-tag color="purple" class="qr-tag"><span>{{ i18n "pages.settings.subSettings"}}</span></a-tag>
        <tr-qr-bg class="qr-bg-sub">
          <tr-qr-bg-inner class="qr-bg-sub-inner">
          <canvas @click="copy(genSubLink(qrModal.client.subId))" id="qrCode-sub" class="qr-cv"></canvas>
          </tr-qr-bg-inner>
        </tr-qr-bg>
      </tr-qr-box>
      <tr-qr-box class="qr-box" v-if="app.subSettings.subJsonEnable">
        <a-tag color="purple" class="qr-tag"><span>{{ i18n "pages.settings.subSettings"}} Json</span></a-tag>
        <tr-qr-bg class="qr-bg-sub">
          <tr-qr-bg-inner class="qr-bg-sub-inner">
            <canvas @click="copy(genSubJsonLink(qrModal.client.subId))" id="qrCode-subJson" class="qr-cv"></canvas>
          </tr-qr-bg-inner>
        </tr-qr-bg>
      </tr-qr-box>
    </template>
    <template v-for="(row, index) in qrModal.qrcodes">
      <tr-qr-box class="qr-box">
        <a-tag color="green" class="qr-tag"><span>[[ row.remark ]]</span></a-tag>
        <tr-qr-bg class="qr-bg">
          <canvas @click="copy(row.link)" :id="'qrCode-'+index" class="qr-cv"></canvas>
        </tr-qr-bg>
      </tr-qr-box>
    </template>
  </tr-qr-modal>
</a-modal>

<style>
  .ant-table:not(.ant-table-expanded-row .ant-table) {
    outline: 1px solid #f0f0f0;
    outline-offset: -1px;
    border-radius: 1rem;
    overflow-x: hidden;
  }
  
  /* QR code transition effects */
  .qr-cv {
    transition: all 0.3s ease-in-out;
  }
  
  .qr-transition-enter-active, .qr-transition-leave-active {
    transition: opacity 0.3s, transform 0.3s;
  }
  
  .qr-transition-enter, .qr-transition-leave-to {
    opacity: 0;
    transform: scale(0.9);
  }
  
  .qr-transition-enter-to, .qr-transition-leave {
    opacity: 1;
    transform: scale(1);
  }
  
  .qr-flash {
    animation: qr-flash-animation 0.6s;
  }
  
  @keyframes qr-flash-animation {
    0% {
      opacity: 1;
      transform: scale(1);
    }
    50% {
      opacity: 0.5;
      transform: scale(0.95);
    }
    100% {
      opacity: 1;
      transform: scale(1);
    }
  }
</style>

<script>
  const qrModal = {
    title: '',
    dbInbound: new DBInbound(),
    client: null,
    qrcodes: [],
    visible: false,
    subId: '',
    show: function (title = '', dbInbound, client) {
      this.title = title;
      this.dbInbound = dbInbound;
      this.inbound = dbInbound.toInbound();
      this.client = client;
      this.subId = '';
      this.qrcodes = [];
      // Reset the status fetched flag when showing the modal
      if (qrModalApp) qrModalApp.statusFetched = false;
      if (this.inbound.protocol == Protocols.WIREGUARD) {
        this.inbound.genInboundLinks(dbInbound.remark).split('\r\n').forEach((l, index) => {
          this.qrcodes.push({
            remark: "Peer " + (index + 1),
            link: l,
            originalLink: l
          });
        });
      } else {
        this.inbound.genAllLinks(this.dbInbound.remark, app.remarkModel, client).forEach(l => {
          this.qrcodes.push({
            remark: l.remark,
            link: l.link,
            originalLink: l.link
          });
        });
      }
      this.visible = true;
    },
    close: function () {
      this.visible = false;
    },
  };
  const qrModalApp = new Vue({
    delimiters: ['[[', ']]'],
    el: '#qrcode-modal',
    mixins: [MediaQueryMixin],
    data: {
      qrModal: qrModal,
      serverStatus: null,
      statusFetched: false,
      hostVariant: 'default',
    },
    computed: {
      availableVariants() {
        const variants = [{ key: 'default', label: '默认' }];
        const publicIP = this.serverStatus && this.serverStatus.publicIP ? this.serverStatus.publicIP : null;
        if (publicIP && publicIP.ipv4 && publicIP.ipv4 !== 'N/A') {
          variants.push({ key: 'ipv4', label: 'IPv4' });
        }
        if (publicIP && publicIP.ipv6 && publicIP.ipv6 !== 'N/A') {
          variants.push({ key: 'ipv6', label: 'IPv6' });
        }
        return variants;
      }
    },
    methods: {
      async getStatus() {
        try {
          const msg = await HttpUtil.get('/panel/api/server/status');
          if (msg.success) {
            this.serverStatus = msg.obj;
          }
        } catch (e) {
          console.error("Failed to get status:", e);
        }
      },
      
      setHostVariant(variant) {
        this.hostVariant = variant;
        this.applyVariantToAllLinks();
      },
      getVariantHost() {
        if (!this.serverStatus || !this.serverStatus.publicIP) {
          return '';
        }
        if (this.hostVariant === 'ipv4') {
          return this.serverStatus.publicIP.ipv4 && this.serverStatus.publicIP.ipv4 !== 'N/A' ? this.serverStatus.publicIP.ipv4 : '';
        }
        if (this.hostVariant === 'ipv6') {
          return this.serverStatus.publicIP.ipv6 && this.serverStatus.publicIP.ipv6 !== 'N/A' ? this.serverStatus.publicIP.ipv6 : '';
        }
        return '';
      },
      applyVariantToAllLinks() {
        const host = this.getVariantHost();
        qrModal.qrcodes.forEach((row, index) => {
          row.link = host ? this.replaceLineHost(row.originalLink, host) : row.originalLink;
          const canvasElement = document.querySelector('#qrCode-' + index);
          if (canvasElement) {
            canvasElement.classList.add('qr-flash');
            setTimeout(() => {
              canvasElement.classList.remove('qr-flash');
            }, 600);
          }
          this.setQrCode("qrCode-" + index, row.link);
        });
        if (qrModal.client && qrModal.client.subId) {
          this.setQrCode("qrCode-sub", this.genSubLink(qrModal.subId));
          if (app.subSettings.subJsonEnable) {
            this.setQrCode("qrCode-subJson", this.genSubJsonLink(qrModal.subId));
          }
        }
      },
      copy(content) {
        ClipboardManager
          .copyText(content)
          .then(() => {
            app.$message.success('{{ i18n "copied" }}')
          })
      },
      setQrCode(elementId, content) {
        new QRious({
          element: document.querySelector('#' + elementId),
          size: 400,
          value: content,
          background: 'white',
          backgroundAlpha: 0,
          foreground: 'black',
          padding: 2,
          level: 'L'
        });
      },
      genSubLink(subID) {
        const raw = app.subSettings.subURI + subID;
        const host = this.getVariantHost();
        return host ? this.replaceLineHost(raw, host) : raw;
      },
      genSubJsonLink(subID) {
        const raw = app.subSettings.subJsonURI + subID;
        const host = this.getVariantHost();
        return host ? this.replaceLineHost(raw, host) : raw;
      },
      replaceLineHost(line, host) {
        const trimmed = (line || '').trim();
        if (!trimmed) {
          return line;
        }
        if (trimmed.startsWith('vmess://')) {
          return this.replaceVmessHost(line, host);
        }
        if (trimmed.startsWith('ss://')) {
          return this.replaceSsHost(line, host);
        }
        if (trimmed.includes('Endpoint = ')) {
          return this.replaceWireGuardHost(line, host);
        }
        if (
          trimmed.startsWith('vless://') ||
          trimmed.startsWith('trojan://') ||
          trimmed.startsWith('hysteria://') ||
          trimmed.startsWith('http://') ||
          trimmed.startsWith('https://')
        ) {
          return this.replaceURLHost(line, host);
        }
        return line;
      },
      replaceURLHost(line, host) {
        try {
          const url = new URL(line.trim());
          url.hostname = host;
          return url.toString();
        } catch (e) {
          return line;
        }
      },
      replaceVmessHost(line, host) {
        try {
          const payload = line.trim().slice('vmess://'.length);
          const data = JSON.parse(atob(payload));
          if (!data.add) {
            return line;
          }
          data.add = host;
          return 'vmess://' + btoa(JSON.stringify(data));
        } catch (e) {
          return line;
        }
      },
      replaceSsHost(line, host) {
        const match = line.trim().match(/^(ss:\/\/(?:[^@]+@)?)(\[[^\]]+\]|[^:/?#]+)(:\d+(?:[/?#].*)?)$/i);
        if (!match) {
          return line;
        }
        return match[1] + this.formatHostForAuthority(host) + match[3];
      },
      replaceWireGuardHost(line, host) {
        return line.replace(/(Endpoint = )(\[[^\]]+\]|[^:]+)(:\d+)/, (_, prefix, _currentHost, port) => {
          return prefix + this.formatHostForAuthority(host) + port;
        });
      },
      formatHostForAuthority(host) {
        if (!host) {
          return host;
        }
        if (host.includes(':') && !host.startsWith('[') && !host.endsWith(']')) {
          return `[${host}]`;
        }
        return host;
      },
      revertOverflow() {
        const elements = document.querySelectorAll(".qr-tag");
        elements.forEach((element) => {
          element.classList.remove("tr-marquee");
          element.children[0].style.animation = '';
          while (element.children.length > 1) {
            element.removeChild(element.lastChild);
          }
        });
      }
    },
    updated() {
      if (this.qrModal.visible) {
        fixOverflow();
        if (!this.statusFetched) {
          this.getStatus();
          this.statusFetched = true;
        }
      } else {
        this.revertOverflow();
        // Reset the flag when modal is closed so it will fetch again next time
        this.statusFetched = false;
        this.hostVariant = 'default';
      }
      if (qrModal.client && qrModal.client.subId) {
        qrModal.subId = qrModal.client.subId;
        this.setQrCode("qrCode-sub", this.genSubLink(qrModal.subId));
        if (app.subSettings.subJsonEnable) {
          this.setQrCode("qrCode-subJson", this.genSubJsonLink(qrModal.subId));
        }
      }
      qrModal.qrcodes.forEach((element, index) => {
        this.setQrCode("qrCode-" + index, element.link);
      });
      if (this.hostVariant !== 'default' && this.serverStatus && this.serverStatus.publicIP) {
        this.applyVariantToAllLinks();
      }
    }
  });

  function fixOverflow() {
    const elements = document.querySelectorAll(".qr-tag");
    elements.forEach((element) => {
      function isElementOverflowing(element) {
        const overflowX = element.offsetWidth < element.scrollWidth,
          overflowY = element.offsetHeight < element.scrollHeight;
        return overflowX || overflowY;
      }

      function wrapContentsInMarquee(element) {
        element.classList.add("tr-marquee");
        element.children[0].style.animation = `move-ltr ${(element.children[0].clientWidth / element.clientWidth) * 5
          }s ease-in-out infinite`;
        const marqueeText = element.children[0];
        if (element.children.length < 2) {
          for (let i = 0; i < 1; i++) {
            const marqueeText = element.children[0].cloneNode(true);
            element.children[0].after(marqueeText);
          }
        }
      }
      if (isElementOverflowing(element)) {
        wrapContentsInMarquee(element);
      }
    });
  }
</script>
{{end}}
